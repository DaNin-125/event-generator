<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動資料產生器</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e12;
      --surface: #16161c;
      --surface2: #1d1d25;
      --border: #2a2a38;
      --text: #e4e4f0;
      --muted: #5a5a78;
      --accent: #7c6af5;
      --accent-hover: #9080ff;
      --accent-dim: rgba(124,106,245,0.12);
      --green: #4ecb71;
      --red: #f06060;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 24px 80px;
      max-width: 960px;
      margin: 0 auto;
    }

    .header { margin-bottom: 28px; }
    .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .header p  { color: var(--muted); font-size: 13px; margin-top: 4px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }

    input[type="password"],
    input[type="text"],
    input[type="url"],
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 13px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; line-height: 1.6; }

    /* tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 14px; }
    .tab {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      color: var(--muted);
      background: transparent;
      transition: all 0.15s;
    }
    .tab.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .url-row { display: flex; gap: 8px; }
    .url-row input { flex: 1; }

    .parse-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.35; cursor: default; transform: none; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-green { background: #1e4d30; color: var(--green); border: 1px solid #2a6b40; }
    .btn-green:hover:not(:disabled) { background: #265e3a; }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { background: #252530; }

    .btn-del {
      background: transparent;
      color: var(--muted);
      padding: 5px 9px;
      font-size: 16px;
      border-radius: 6px;
    }
    .btn-del:hover { background: rgba(240,96,96,0.12); color: var(--red); }

    .status {
      font-size: 13px;
      padding: 2px 0;
      flex: 1;
    }
    .status-loading { color: var(--accent); }
    .status-error   { color: var(--red); }
    .status-success { color: var(--green); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.55s linear infinite;
      flex-shrink: 0;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .result-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .table-scroll {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    table {
      border-collapse: collapse;
      min-width: 100%;
      font-size: 13px;
    }

    thead th {
      background: #111118;
      padding: 9px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--accent-dim); }

    tbody td { padding: 0; vertical-align: middle; }
    td.cell-del { padding: 0 4px; width: 36px; }

    td input[type="text"] {
      border: none;
      border-radius: 0;
      background: transparent;
      padding: 8px 11px;
      font-size: 13px;
      min-width: 90px;
      transition: background 0.1s;
    }
    td input[type="text"]:focus { background: rgba(124,106,245,0.08); }

    td.col-title    input { min-width: 220px; }
    td.col-region   input { min-width: 100px; }
    td.col-loc      input { min-width: 180px; }
    td.col-city     input { min-width: 100px; }
    td.col-org      input { min-width: 150px; }
    td.col-date     input { min-width: 120px; }
    td.col-tz       input { min-width: 130px; }
    td.col-time     input { min-width: 130px; }
    td.col-url      input { min-width: 200px; }
    td.col-img      input { min-width: 200px; }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 44px 20px;
      font-size: 14px;
      line-height: 1.8;
    }
    .empty-state span { display: block; font-size: 28px; margin-bottom: 8px; }

    .count-badge {
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>活動資料產生器</h1>
  <p>貼上活動文字或網址，自動解析並匯出 Excel</p>
</div>

<!-- API Key -->
<div class="card">
  <div class="card-label">Anthropic API Key</div>
  <input type="password" id="apiKey" placeholder="sk-ant-api03-…" autocomplete="off" />
</div>

<!-- Input -->
<div class="card">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('text')">📝 貼上文字</button>
    <button class="tab" onclick="switchTab('url')">🔗 貼上網址</button>
  </div>

  <!-- Text tab -->
  <div class="tab-panel active" id="panel-text">
    <textarea id="inputText" rows="8"
      placeholder="貼上活動公告、票務頁面文字、演唱會介紹等，可包含多個活動…"></textarea>
  </div>

  <!-- URL tab -->
  <div class="tab-panel" id="panel-url">
    <div class="url-row">
      <input type="url" id="inputUrl" placeholder="https://example.com/event" />
    </div>
    <p style="font-size:12px;color:var(--muted);margin-top:8px;">
      ⚠️ 部分網站因安全設定無法直接擷取，若失敗請切換到「貼上文字」手動貼入內容。
    </p>
  </div>

  <div class="parse-row">
    <button class="btn-primary" id="parseBtn" onclick="handleParse()">
      <span id="parseBtnContent">✦ 解析活動</span>
    </button>
    <button class="btn-ghost" onclick="clearAll()">清除全部</button>
    <span id="status" class="status"></span>
  </div>
</div>

<!-- Result -->
<div class="card">
  <div class="result-header">
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="card-label" style="margin-bottom:0">解析結果</div>
      <span id="rowCount" class="count-badge" style="display:none">0 筆</span>
    </div>
    <div class="result-actions">
      <button class="btn-ghost" onclick="addRow()">＋ 新增一列</button>
      <button class="btn-ghost" onclick="copyTSV()">複製 → 試算表</button>
      <button class="btn-green" onclick="exportExcel()">⬇ 下載 Excel</button>
    </div>
  </div>

  <div class="table-scroll">
    <table id="resultTable">
      <thead><tr></tr></thead>
      <tbody id="tableBody">
        <tr>
          <td colspan="18">
            <div class="empty-state">
              <span>📋</span>
              貼上活動文字或網址後按「解析活動」<br>結果顯示在這裡，每格可直接編輯
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const COLS = [
  ['title',         'col-title',  '活動名稱'],
  ['region',        'col-region', '地區'],
  ['location',      'col-loc',    '地點'],
  ['city',          'col-city',   '城市'],
  ['organizer',     'col-org',    '主辦單位'],
  ['start_date',    'col-date',   '開始日期'],
  ['end_date',      'col-date',   '結束日期'],
  ['timezone',      'col-tz',     '時區'],
  ['event_time',    'col-time',   '活動時間'],
  ['website_url',   'col-url',    '官網'],
  ['twitter_url',   'col-url',    'Twitter'],
  ['facebook_url',  'col-url',    'Facebook'],
  ['instagram_url', 'col-url',    'Instagram'],
  ['bluesky_url',   'col-url',    'Bluesky'],
  ['img',           'col-img',    '圖片'],
  ['threads',       'col-url',    'Threads'],
  ['threads_loc',   'col-url',    'Threads 地點'],
];

let rows = [];
let activeTab = 'text';

const apiKeyEl = document.getElementById('apiKey');
apiKeyEl.value = localStorage.getItem('ant_key') || '';
apiKeyEl.addEventListener('input', () => localStorage.setItem('ant_key', apiKeyEl.value.trim()));

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && tab === 'text') || (i === 1 && tab === 'url'));
  });
  document.getElementById('panel-text').classList.toggle('active', tab === 'text');
  document.getElementById('panel-url').classList.toggle('active', tab === 'url');
}

function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (type ? ' status-' + type : '');
}

function setBtnLoading(loading) {
  const btn = document.getElementById('parseBtn');
  const content = document.getElementById('parseBtnContent');
  btn.disabled = loading;
  content.innerHTML = loading ? '<span class="spinner"></span> 解析中…' : '✦ 解析活動';
}

async function handleParse() {
  if (activeTab === 'url') {
    await parseFromUrl();
  } else {
    await parseText(document.getElementById('inputText').value.trim());
  }
}

async function parseFromUrl() {
  const url = document.getElementById('inputUrl').value.trim();
  if (!url) { setStatus('請輸入活動網址', 'error'); return; }

  setBtnLoading(true);
  setStatus('擷取頁面中…', 'loading');

  try {
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error('無法擷取頁面');
    const data = await res.json();
    const html = data.contents || '';

    // strip tags, keep text
    const div = document.createElement('div');
    div.innerHTML = html;
    const text = div.innerText || div.textContent || '';
    if (!text.trim()) throw new Error('頁面內容為空');

    await parseText(text.substring(0, 8000));
  } catch (e) {
    setStatus('擷取失敗：' + e.message + '，請改用「貼上文字」', 'error');
    setBtnLoading(false);
  }
}

async function parseText(text) {
  const apiKey = apiKeyEl.value.trim();
  if (!apiKey) { setStatus('請先填入 Anthropic API Key', 'error'); setBtnLoading(false); return; }
  if (!text)   { setStatus('請貼上活動資訊文字', 'error'); setBtnLoading(false); return; }

  setBtnLoading(true);
  setStatus('AI 解析中…', 'loading');

  const system = `你是活動資料解析器，從文字中提取活動資訊並回傳 JSON。

欄位定義：
- title: 活動完整名稱
- region: 地區（如：台灣、日本、亞洲等大範圍區域）
- location: 活動地點（場地名稱）
- city: 城市（如：台北、東京、首爾）
- organizer: 主辦單位或主辦品牌
- start_date: 開始日期，格式 YYYY-MM-DD
- end_date: 結束日期，格式 YYYY-MM-DD（單日活動與 start_date 相同）
- timezone: 時區（如：Asia/Taipei、Asia/Tokyo）
- event_time: 活動時間（如：19:00、14:00-17:00）
- website_url: 官方網站網址
- twitter_url: Twitter/X 帳號或活動頁網址
- facebook_url: Facebook 粉絲頁或活動頁網址
- instagram_url: Instagram 帳號或活動頁網址
- bluesky_url: Bluesky 帳號或活動頁網址
- img: 活動主視覺圖片網址
- threads: Threads 帳號或活動頁網址
- threads_loc: Threads 地點標記

規則：
1. 若文字包含多個活動，每個活動獨立一筆
2. 無法判斷的欄位填空字串 ""
3. 只回傳 JSON，不加說明文字

格式：{"events":[{"title":"","region":"","location":"","city":"","organizer":"","start_date":"","end_date":"","timezone":"","event_time":"","website_url":"","twitter_url":"","facebook_url":"","instagram_url":"","bluesky_url":"","img":"","threads":"","threads_loc":""}]}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-allow-browser': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 2048,
        system,
        messages: [{ role: 'user', content: text }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const raw = data.content?.[0]?.text?.trim() || '';
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('回傳格式有誤');

    const parsed = JSON.parse(match[0]);
    const events = Array.isArray(parsed.events) ? parsed.events : [];

    if (events.length === 0) {
      setStatus('未能從文字中解析出活動資料', 'error');
    } else {
      rows = [...rows, ...events];
      renderTable();
      setStatus(`✓ 解析完成，共 ${events.length} 筆`, 'success');
    }
  } catch (e) {
    setStatus('錯誤：' + e.message, 'error');
  } finally {
    setBtnLoading(false);
  }
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const badge = document.getElementById('rowCount');

  if (rows.length === 0) {
    badge.style.display = 'none';
    tbody.innerHTML = `<tr><td colspan="${COLS.length + 1}"><div class="empty-state"><span>📋</span>貼上活動文字或網址後按「解析活動」<br>結果顯示在這裡，每格可直接編輯</div></td></tr>`;
    return;
  }

  badge.style.display = '';
  badge.textContent = rows.length + ' 筆';

  tbody.innerHTML = rows.map((row, i) => `
    <tr>
      <td class="cell-del">
        <button class="btn-del" onclick="deleteRow(${i})" title="刪除">×</button>
      </td>
      ${COLS.map(([col, cls]) => `
        <td class="${cls}">
          <input type="text"
            value="${esc(row[col] || '')}"
            placeholder="${col}"
            oninput="rows[${i}]['${col}']=this.value"
          />
        </td>
      `).join('')}
    </tr>
  `).join('');
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/"/g,'&quot;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function deleteRow(i) {
  rows.splice(i, 1);
  renderTable();
  if (rows.length === 0) setStatus('');
}

function addRow() {
  const empty = {};
  COLS.forEach(([c]) => empty[c] = '');
  rows.push(empty);
  renderTable();
  const tbody = document.getElementById('tableBody');
  tbody.lastElementChild?.querySelector('input')?.focus();
}

function clearAll() {
  if (rows.length === 0 && !document.getElementById('inputText').value) return;
  if (rows.length > 0 && !confirm('確定清除所有資料？')) return;
  rows = [];
  document.getElementById('inputText').value = '';
  document.getElementById('inputUrl').value = '';
  renderTable();
  setStatus('');
}

function copyTSV() {
  if (rows.length === 0) { setStatus('目前沒有資料', 'error'); return; }
  const header = COLS.map(([,, label]) => label).join('\t');
  const body = rows.map(r => COLS.map(([c]) => (r[c] || '').replace(/\t/g,' ')).join('\t'));
  navigator.clipboard.writeText([header, ...body].join('\n'))
    .then(() => setStatus('✓ 已複製！直接貼到 Google 試算表', 'success'))
    .catch(() => setStatus('複製失敗', 'error'));
}

function exportExcel() {
  if (rows.length === 0) { setStatus('目前沒有資料', 'error'); return; }

  const wsData = [
    COLS.map(([,, label]) => label),
    ...rows.map(r => COLS.map(([c]) => r[c] || ''))
  ];

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);

  ws['!cols'] = [
    { wch: 40 }, // title
    { wch: 12 }, // region
    { wch: 25 }, // location
    { wch: 12 }, // city
    { wch: 22 }, // organizer
    { wch: 14 }, // start_date
    { wch: 14 }, // end_date
    { wch: 16 }, // timezone
    { wch: 16 }, // event_time
    { wch: 35 }, // website_url
    { wch: 35 }, // twitter_url
    { wch: 35 }, // facebook_url
    { wch: 35 }, // instagram_url
    { wch: 35 }, // bluesky_url
    { wch: 35 }, // img
    { wch: 35 }, // threads
    { wch: 25 }, // threads_loc
  ];

  XLSX.utils.book_append_sheet(wb, ws, '活動資料');

  const date = new Date().toISOString().slice(0,10).replace(/-/g,'');
  XLSX.writeFile(wb, `活動資料_${date}.xlsx`);
  setStatus('✓ Excel 已下載', 'success');
}

// init table header
document.querySelector('#resultTable thead tr').innerHTML =
  '<th></th>' + COLS.map(([,, label]) => `<th>${label}</th>`).join('');
</script>

</body>
</html>
